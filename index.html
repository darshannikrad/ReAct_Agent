<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ReAct Agent · Intelligence Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  /* ── RESET & BASE ─────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #090c10;
    --surface:   #0e1319;
    --border:    #1c2430;
    --border-hi: #2d3f52;
    --accent:    #00e5ff;
    --accent2:   #7b5ea7;
    --success:   #00e676;
    --warn:      #ff6d00;
    --danger:    #ff1744;
    --text:      #cdd9e5;
    --muted:     #546e7a;
    --font-mono: 'Space Mono', monospace;
    --font-head: 'Syne', sans-serif;
    --radius:    6px;
    --glow:      0 0 20px rgba(0,229,255,.18);
  }

  html { font-size: 15px; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* scanline overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,.08) 2px,
      rgba(0,0,0,.08) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* ── LAYOUT ──────────────────────────────────────────────────── */
  .shell {
    display: grid;
    grid-template-rows: 56px 1fr;
    grid-template-columns: 260px 1fr 300px;
    height: 100vh;
    gap: 0;
  }

  /* ── TOPBAR ──────────────────────────────────────────────────── */
  .topbar {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: relative;
    z-index: 10;
  }

  .topbar-logo {
    font-family: var(--font-head);
    font-weight: 800;
    font-size: 1.15rem;
    color: var(--accent);
    letter-spacing: -.02em;
    text-transform: uppercase;
  }

  .topbar-logo span { color: var(--text); }

  .topbar-badge {
    font-size: .65rem;
    padding: 2px 8px;
    border-radius: 999px;
    background: rgba(0,229,255,.1);
    border: 1px solid rgba(0,229,255,.3);
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: .08em;
  }

  .topbar-status {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: .7rem;
    color: var(--muted);
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    animation: pulse 2s infinite;
  }

  .status-dot.online { background: var(--success); }

  @keyframes pulse {
    0%,100% { opacity: 1; }
    50%      { opacity: .4; }
  }

  /* ── NAV SIDEBAR ─────────────────────────────────────────────── */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 20px 0;
    overflow-y: auto;
  }

  .nav-section {
    padding: 0 16px 8px;
    font-size: .6rem;
    color: var(--muted);
    letter-spacing: .12em;
    text-transform: uppercase;
    margin-top: 16px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 20px;
    font-size: .78rem;
    color: var(--muted);
    cursor: pointer;
    transition: all .15s;
    border-left: 2px solid transparent;
    user-select: none;
  }

  .nav-item:hover { color: var(--text); background: rgba(255,255,255,.03); }

  .nav-item.active {
    color: var(--accent);
    border-left-color: var(--accent);
    background: rgba(0,229,255,.06);
  }

  .nav-icon { font-size: .95rem; width: 16px; text-align: center; }

  /* ── MAIN CONTENT ────────────────────────────────────────────── */
  .main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  /* ── CHAT VIEW ───────────────────────────────────────────────── */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px 28px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    scroll-behavior: smooth;
  }

  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }

  /* welcome banner */
  .welcome {
    text-align: center;
    padding: 48px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    opacity: .85;
  }

  .welcome-title {
    font-family: var(--font-head);
    font-size: 2.2rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
  }

  .welcome-sub {
    font-size: .78rem;
    color: var(--muted);
    max-width: 360px;
    line-height: 1.7;
  }

  .welcome-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 10px;
  }

  .chip {
    padding: 6px 14px;
    font-size: .7rem;
    border-radius: var(--radius);
    border: 1px solid var(--border-hi);
    color: var(--muted);
    cursor: pointer;
    transition: all .15s;
    background: var(--surface);
  }

  .chip:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,229,255,.05);
  }

  /* message bubbles */
  .msg { display: flex; flex-direction: column; gap: 4px; max-width: 780px; }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.agent { align-self: flex-start; align-items: flex-start; }

  .msg-label {
    font-size: .6rem;
    color: var(--muted);
    letter-spacing: .08em;
    text-transform: uppercase;
    padding: 0 4px;
  }

  .bubble {
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: .82rem;
    line-height: 1.7;
    max-width: 640px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg.user .bubble {
    background: rgba(0,229,255,.1);
    border: 1px solid rgba(0,229,255,.25);
    color: var(--accent);
    border-radius: var(--radius) var(--radius) 2px var(--radius);
  }

  .msg.agent .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius) var(--radius) var(--radius) 2px;
  }

  .bubble.valid   { border-color: rgba(0,230,118,.3); }
  .bubble.invalid { border-color: rgba(255,23,68,.3); }

  /* badges on agent bubbles */
  .bubble-meta {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }

  .badge {
    font-size: .58rem;
    padding: 2px 7px;
    border-radius: 999px;
    border: 1px solid;
    text-transform: uppercase;
    letter-spacing: .06em;
  }

  .badge.source-learned { border-color: var(--accent2); color: var(--accent2); }
  .badge.source-agent   { border-color: var(--border-hi); color: var(--muted); }
  .badge.valid   { border-color: var(--success); color: var(--success); }
  .badge.invalid { border-color: var(--danger);  color: var(--danger); }

  /* plan accordion */
  .plan-toggle {
    font-size: .65rem;
    color: var(--muted);
    cursor: pointer;
    margin-top: 6px;
    display: flex;
    align-items: center;
    gap: 5px;
    user-select: none;
    transition: color .15s;
  }

  .plan-toggle:hover { color: var(--accent); }

  .plan-box {
    background: rgba(0,0,0,.3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: .72rem;
    color: var(--muted);
    line-height: 1.7;
    margin-top: 4px;
    white-space: pre-wrap;
  }

  /* thinking indicator */
  .thinking {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: .75rem;
    color: var(--muted);
    width: fit-content;
  }

  .dots { display: flex; gap: 4px; }
  .dots span {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
    animation: bounce .8s infinite;
  }
  .dots span:nth-child(2) { animation-delay: .15s; }
  .dots span:nth-child(3) { animation-delay: .3s; }

  @keyframes bounce {
    0%,80%,100% { transform: translateY(0); opacity: .4; }
    40%          { transform: translateY(-5px); opacity: 1; }
  }

  /* ── INPUT BAR ───────────────────────────────────────────────── */
  .input-bar {
    padding: 16px 28px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .input-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    background: var(--bg);
    border: 1px solid var(--border-hi);
    border-radius: var(--radius);
    transition: border-color .2s, box-shadow .2s;
    padding: 0 14px;
  }

  .input-wrap:focus-within {
    border-color: var(--accent);
    box-shadow: var(--glow);
  }

  .prompt-prefix {
    font-size: .75rem;
    color: var(--accent);
    margin-right: 8px;
    user-select: none;
    flex-shrink: 0;
  }

  textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: .82rem;
    resize: none;
    padding: 12px 0;
    min-height: 42px;
    max-height: 140px;
    line-height: 1.5;
  }

  .send-btn {
    padding: 10px 20px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: var(--radius);
    font-family: var(--font-head);
    font-weight: 700;
    font-size: .78rem;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: .06em;
    transition: all .15s;
    flex-shrink: 0;
    height: 44px;
  }

  .send-btn:hover  { background: #33eeff; transform: translateY(-1px); }
  .send-btn:active { transform: translateY(0); }
  .send-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

  /* ── RIGHT PANEL ─────────────────────────────────────────────── */
  .right-panel {
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
  }

  .panel-tab {
    flex: 1;
    padding: 11px 6px;
    text-align: center;
    font-size: .65rem;
    color: var(--muted);
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: .07em;
    border-bottom: 2px solid transparent;
    transition: all .15s;
    user-select: none;
  }

  .panel-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    background: rgba(0,229,255,.04);
  }

  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .panel-body::-webkit-scrollbar { width: 3px; }
  .panel-body::-webkit-scrollbar-thumb { background: var(--border); }

  /* metric card */
  .metric-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .metric-label {
    font-size: .58rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .1em;
  }

  .metric-value {
    font-family: var(--font-head);
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--text);
  }

  .metric-value.accent { color: var(--accent); }
  .metric-value.success { color: var(--success); }
  .metric-value.danger  { color: var(--danger); }

  .metrics-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  /* mini bar chart */
  .mini-chart { display: flex; flex-direction: column; gap: 6px; }
  .bar-row { display: flex; align-items: center; gap: 8px; font-size: .6rem; color: var(--muted); }
  .bar-track {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--accent);
    transition: width .4s ease;
  }
  .bar-fill.danger { background: var(--danger); }

  /* memory entries */
  .mem-entry {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    font-size: .7rem;
    line-height: 1.6;
  }

  .mem-q { color: var(--accent); font-size: .65rem; margin-bottom: 4px; }
  .mem-a { color: var(--text); }

  /* run history row */
  .run-row {
    display: flex;
    gap: 8px;
    align-items: center;
    padding: 7px 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: .65rem;
  }

  .run-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .run-dot.ok  { background: var(--success); }
  .run-dot.bad { background: var(--danger); }

  .run-q {
    flex: 1;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .run-t { color: var(--muted); opacity: .6; }

  /* section heading */
  .section-head {
    font-size: .6rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .1em;
    margin-bottom: 2px;
  }

  /* empty state */
  .empty {
    text-align: center;
    color: var(--muted);
    font-size: .7rem;
    padding: 24px;
  }

  /* error toast */
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--danger);
    color: #fff;
    padding: 10px 20px;
    border-radius: var(--radius);
    font-size: .78rem;
    z-index: 1000;
    animation: fadeInUp .3s ease;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateX(-50%) translateY(8px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  /* ── VIEWS ───────────────────────────────────────────────────── */
  .view { display: none; flex-direction: column; overflow: hidden; flex: 1; }
  .view.active { display: flex; }

  /* ── RESPONSIVE (basic) ──────────────────────────────────────── */
  @media (max-width: 900px) {
    .shell { grid-template-columns: 0 1fr 0; }
    .sidebar, .right-panel { display: none; }
  }

  /* scrollbar hidden globally */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>

<div class="shell" id="app">

  <!-- ── TOP BAR ───────────────────────────────────────────────── -->
  <header class="topbar">
    <span class="topbar-logo">ReAct<span>Agent</span></span>
    <span class="topbar-badge">v2.0</span>
    <span class="topbar-badge" id="model-badge">llama-3.3-70b</span>
    <div class="topbar-status">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">connecting…</span>
    </div>
  </header>

  <!-- ── LEFT SIDEBAR ──────────────────────────────────────────── -->
  <nav class="sidebar">
    <div class="nav-section">Workspace</div>
    <div class="nav-item active" data-view="chat">
      <span class="nav-icon">⌨</span> Chat
    </div>
    <div class="nav-item" data-view="metrics">
      <span class="nav-icon">◈</span> Metrics
    </div>
    <div class="nav-item" data-view="memory">
      <span class="nav-icon">◉</span> Memory
    </div>
    <div class="nav-item" data-view="history">
      <span class="nav-icon">≡</span> Run History
    </div>

    <div class="nav-section" style="margin-top:auto">System</div>
    <div class="nav-item" id="clear-btn">
      <span class="nav-icon">✕</span> Clear Chat
    </div>
  </nav>

  <!-- ── MAIN AREA ─────────────────────────────────────────────── -->
  <main class="main">

    <!-- CHAT VIEW -->
    <div class="view active" id="view-chat">
      <div class="chat-area" id="chat-area">
        <div class="welcome" id="welcome">
          <div class="welcome-title">Intelligence Terminal</div>
          <div class="welcome-sub">
            ReAct agent with planning, critic verification,
            learned memory &amp; tool execution.
          </div>
          <div class="welcome-chips" id="chips"></div>
        </div>
      </div>
      <div class="input-bar">
        <div class="input-wrap">
          <span class="prompt-prefix">&gt;_</span>
          <textarea id="input-box" placeholder="Ask anything…" rows="1"></textarea>
        </div>
        <button class="send-btn" id="send-btn">RUN</button>
      </div>
    </div>

    <!-- METRICS VIEW -->
    <div class="view" id="view-metrics">
      <div class="chat-area" id="metrics-body"></div>
    </div>

    <!-- MEMORY VIEW -->
    <div class="view" id="view-memory">
      <div class="chat-area" id="memory-body"></div>
    </div>

    <!-- HISTORY VIEW -->
    <div class="view" id="view-history">
      <div class="chat-area" id="history-body"></div>
    </div>

  </main>

  <!-- ── RIGHT PANEL ────────────────────────────────────────────── -->
  <aside class="right-panel">
    <div class="panel-tabs">
      <div class="panel-tab active" data-tab="live">Live</div>
      <div class="panel-tab" data-tab="stats">Stats</div>
    </div>

    <div class="panel-body" id="panel-live">
      <div class="section-head">Last Run</div>
      <div id="live-content" class="empty">No runs yet.</div>
    </div>

    <div class="panel-body" id="panel-stats" style="display:none">
      <div id="stats-content" class="empty">No data yet.</div>
    </div>
  </aside>

</div>

<!-- toast container -->
<div id="toast" class="toast" style="display:none"></div>

<script>
/* ── CONFIG ─────────────────────────────────────────────────────── */
const API = "http://localhost:8000"; // ← change if deployed

/* ── EXAMPLE CHIPS ───────────────────────────────────────────────── */
const EXAMPLES = [
  "Who is the Prime Minister of India?",
  "Calculate 239 * 323",
  "O(n²) vs O(n!) scalability?",
  "Latest news in AI today",
  "Who is the US President?",
];

/* ── STATE ──────────────────────────────────────────────────────── */
let busy = false;
let currentTab = "live";

/* ── DOM REFS ────────────────────────────────────────────────────── */
const chatArea   = document.getElementById("chat-area");
const inputBox   = document.getElementById("input-box");
const sendBtn    = document.getElementById("send-btn");
const welcome    = document.getElementById("welcome");
const statusDot  = document.getElementById("status-dot");
const statusText = document.getElementById("status-text");

/* ── INIT ────────────────────────────────────────────────────────── */
document.getElementById("chips").innerHTML =
  EXAMPLES.map(e => `<span class="chip" onclick="fillChip(this)">${e}</span>`).join("");

checkHealth();
setInterval(checkHealth, 15000);

/* ── HEALTH CHECK ────────────────────────────────────────────────── */
async function checkHealth() {
  try {
    const r = await fetch(`${API}/health`, { signal: AbortSignal.timeout(4000) });
    const d = await r.json();
    statusDot.className  = "status-dot online";
    statusText.textContent = d.agent_ready ? "agent online" : "stub mode";
  } catch {
    statusDot.className  = "status-dot";
    statusText.textContent = "backend offline";
  }
}

/* ── NAVIGATION ──────────────────────────────────────────────────── */
document.querySelectorAll(".nav-item[data-view]").forEach(el => {
  el.addEventListener("click", () => {
    document.querySelectorAll(".nav-item").forEach(x => x.classList.remove("active"));
    el.classList.add("active");
    const v = el.dataset.view;
    document.querySelectorAll(".view").forEach(x => x.classList.remove("active"));
    document.getElementById(`view-${v}`).classList.add("active");
    if (v === "metrics")  loadMetricsView();
    if (v === "memory")   loadMemoryView();
    if (v === "history")  loadHistoryView();
  });
});

document.getElementById("clear-btn").addEventListener("click", () => {
  chatArea.innerHTML = "";
  welcome.style.display = "flex";
  chatArea.prepend(welcome);
});

/* ── RIGHT PANEL TABS ────────────────────────────────────────────── */
document.querySelectorAll(".panel-tab").forEach(el => {
  el.addEventListener("click", () => {
    document.querySelectorAll(".panel-tab").forEach(x => x.classList.remove("active"));
    el.classList.add("active");
    currentTab = el.dataset.tab;
    document.getElementById("panel-live").style.display  = currentTab === "live"  ? "flex" : "none";
    document.getElementById("panel-stats").style.display = currentTab === "stats" ? "flex" : "none";
    if (currentTab === "stats") loadStatsPanel();
  });
});

/* ── SEND QUERY ──────────────────────────────────────────────────── */
async function sendQuery(query) {
  if (!query.trim() || busy) return;
  busy = true;
  sendBtn.disabled = true;
  welcome.style.display = "none";

  appendMsg("user", null, query);
  const thinkEl = appendThinking();

  try {
    const res = await fetch(`${API}/query`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ query }),
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    thinkEl.remove();
    appendAgentMsg(data);
    updateLivePanel(data);

  } catch (err) {
    thinkEl.remove();
    appendMsg("agent", null, `⚠ Error: ${err.message}\n\nMake sure the backend server is running:\n  uvicorn server:app --reload --port 8000`);
    showToast("Backend unreachable — is the server running?");
  }

  busy = false;
  sendBtn.disabled = false;
  inputBox.focus();
}

/* ── MESSAGE RENDERING ───────────────────────────────────────────── */
function appendMsg(role, label, text) {
  const wrap = document.createElement("div");
  wrap.className = `msg ${role}`;
  if (label) wrap.innerHTML = `<span class="msg-label">${label}</span>`;
  const b = document.createElement("div");
  b.className = "bubble";
  b.textContent = text;
  wrap.appendChild(b);
  chatArea.appendChild(wrap);
  chatArea.scrollTop = chatArea.scrollHeight;
  return wrap;
}

function appendAgentMsg(data) {
  const wrap = document.createElement("div");
  wrap.className = "msg agent";

  const label = document.createElement("span");
  label.className = "msg-label";
  label.textContent = "Agent";
  wrap.appendChild(label);

  const bubble = document.createElement("div");
  bubble.className = `bubble ${data.valid ? "valid" : "invalid"}`;
  bubble.textContent = data.answer;

  // badges
  const meta = document.createElement("div");
  meta.className = "bubble-meta";
  meta.innerHTML = `
    <span class="badge source-${data.source}">${data.source}</span>
    <span class="badge ${data.valid ? "valid" : "invalid"}">${data.valid ? "verified" : "unverified"}</span>
    <span class="badge source-agent">steps: ${data.metrics.steps}</span>
    <span class="badge source-agent">tokens: ${data.metrics.tokens}</span>
  `;
  bubble.appendChild(meta);
  wrap.appendChild(bubble);

  // plan (collapsible)
  if (data.plan && data.source !== "learned") {
    const toggle = document.createElement("div");
    toggle.className = "plan-toggle";
    toggle.innerHTML = `▸ view plan`;
    let open = false;
    const planBox = document.createElement("div");
    planBox.className = "plan-box";
    planBox.textContent = data.plan;
    planBox.style.display = "none";
    toggle.addEventListener("click", () => {
      open = !open;
      planBox.style.display = open ? "block" : "none";
      toggle.innerHTML = open ? "▾ hide plan" : "▸ view plan";
    });
    wrap.appendChild(toggle);
    wrap.appendChild(planBox);
  }

  chatArea.appendChild(wrap);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function appendThinking() {
  const el = document.createElement("div");
  el.className = "msg agent";
  el.innerHTML = `
    <span class="msg-label">Agent</span>
    <div class="thinking">
      <div class="dots"><span></span><span></span><span></span></div>
      reasoning…
    </div>`;
  chatArea.appendChild(el);
  chatArea.scrollTop = chatArea.scrollHeight;
  return el;
}

/* ── LIVE PANEL ──────────────────────────────────────────────────── */
function updateLivePanel(data) {
  const m = data.metrics;
  document.getElementById("live-content").innerHTML = `
    <div class="metric-card">
      <div class="metric-label">Answer Source</div>
      <div class="metric-value" style="font-size:1rem">${data.source}</div>
    </div>
    <div class="metrics-grid">
      <div class="metric-card">
        <div class="metric-label">Steps</div>
        <div class="metric-value accent">${m.steps}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Tools</div>
        <div class="metric-value">${m.tool_calls}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Tokens</div>
        <div class="metric-value">${m.tokens}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Valid</div>
        <div class="metric-value ${m.success ? 'success' : 'danger'}">${m.success ? "✓" : "✗"}</div>
      </div>
    </div>
  `;
}

/* ── METRICS VIEW ────────────────────────────────────────────────── */
async function loadMetricsView() {
  const body = document.getElementById("metrics-body");
  body.innerHTML = `<div class="empty">Loading…</div>`;
  try {
    const r = await fetch(`${API}/metrics`);
    const d = await r.json();
    if (d.total === 0) { body.innerHTML = `<div class="empty">No runs recorded yet.</div>`; return; }

    body.innerHTML = `
      <div class="section-head">Overview · ${d.total} runs</div>
      <div class="metrics-grid">
        <div class="metric-card">
          <div class="metric-label">Success Rate</div>
          <div class="metric-value success">${d.success_rate}%</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Hallucination</div>
          <div class="metric-value ${d.hallucination_rate > 10 ? "danger" : ""}">${d.hallucination_rate}%</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Avg Steps</div>
          <div class="metric-value accent">${d.avg_steps}</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Avg Tokens</div>
          <div class="metric-value">${d.avg_tokens}</div>
        </div>
      </div>

      <div class="section-head">Recent Success/Fail Distribution</div>
      <div class="mini-chart">
        <div class="bar-row">
          <span style="width:70px">Success</span>
          <div class="bar-track"><div class="bar-fill" style="width:${d.success_rate}%"></div></div>
          <span>${d.success_rate}%</span>
        </div>
        <div class="bar-row">
          <span style="width:70px">Halluc.</span>
          <div class="bar-track"><div class="bar-fill danger" style="width:${d.hallucination_rate}%"></div></div>
          <span>${d.hallucination_rate}%</span>
        </div>
        <div class="bar-row">
          <span style="width:70px">Tool use</span>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.min(d.avg_tools * 50, 100)}%"></div></div>
          <span>${d.avg_tools}/run</span>
        </div>
      </div>
    `;
  } catch {
    body.innerHTML = `<div class="empty">Could not load metrics.</div>`;
  }
}

/* ── STATS PANEL ─────────────────────────────────────────────────── */
async function loadStatsPanel() {
  const el = document.getElementById("stats-content");
  try {
    const r = await fetch(`${API}/metrics`);
    const d = await r.json();
    if (!d.total) { el.innerHTML = `<div class="empty">No data yet.</div>`; return; }
    el.innerHTML = `
      <div class="metric-card">
        <div class="metric-label">Total Runs</div>
        <div class="metric-value accent">${d.total}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Success Rate</div>
        <div class="metric-value success">${d.success_rate}%</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Avg Tokens</div>
        <div class="metric-value">${d.avg_tokens}</div>
      </div>
    `;
  } catch {
    el.innerHTML = `<div class="empty">Backend offline.</div>`;
  }
}

/* ── MEMORY VIEW ─────────────────────────────────────────────────── */
async function loadMemoryView() {
  const body = document.getElementById("memory-body");
  body.innerHTML = `<div class="empty">Loading…</div>`;
  try {
    const r = await fetch(`${API}/memory`);
    const d = await r.json();
    if (!d.entries.length) { body.innerHTML = `<div class="empty">No learned memory yet.</div>`; return; }
    body.innerHTML = `<div class="section-head">${d.entries.length} learned entries</div>` +
      d.entries.reverse().map(e => `
        <div class="mem-entry">
          <div class="mem-q">Q: ${e.query}</div>
          <div class="mem-a">A: ${e.answer}</div>
        </div>`).join("");
  } catch {
    body.innerHTML = `<div class="empty">Could not load memory.</div>`;
  }
}

/* ── HISTORY VIEW ────────────────────────────────────────────────── */
async function loadHistoryView() {
  const body = document.getElementById("history-body");
  body.innerHTML = `<div class="empty">Loading…</div>`;
  try {
    const r = await fetch(`${API}/metrics`);
    const d = await r.json();
    if (!d.runs.length) { body.innerHTML = `<div class="empty">No runs yet.</div>`; return; }
    body.innerHTML = `<div class="section-head">Last ${d.runs.length} runs</div>` +
      [...d.runs].reverse().map(run => `
        <div class="run-row">
          <span class="run-dot ${run.success ? "ok" : "bad"}"></span>
          <span class="run-q">${run.query || "(empty)"}</span>
          <span class="run-t">${run.token_usage}t</span>
        </div>`).join("");
  } catch {
    body.innerHTML = `<div class="empty">Could not load history.</div>`;
  }
}

/* ── INPUT EVENTS ────────────────────────────────────────────────── */
sendBtn.addEventListener("click", () => {
  const q = inputBox.value.trim();
  if (q) { inputBox.value = ""; sendQuery(q); }
});

inputBox.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    const q = inputBox.value.trim();
    if (q) { inputBox.value = ""; sendQuery(q); }
  }
});

inputBox.addEventListener("input", () => {
  inputBox.style.height = "auto";
  inputBox.style.height = Math.min(inputBox.scrollHeight, 140) + "px";
});

function fillChip(el) {
  inputBox.value = el.textContent;
  inputBox.focus();
}

/* ── TOAST ───────────────────────────────────────────────────────── */
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.display = "block";
  setTimeout(() => { t.style.display = "none"; }, 3500);
}
</script>
</body>
